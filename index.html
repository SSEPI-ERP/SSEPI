<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSEPI · Iniciar sesión</title>
    <!-- Primer filtro de seguridad: entrada al ERP solo tras autenticación -->
    <link rel="stylesheet" href="/css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body.login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-body); }
        .login-box { width: 100%; max-width: 400px; padding: 2rem; border: 1px solid var(--border); border-radius: var(--border-radius); background: var(--bg-card); }
        .login-box h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text-primary); }
        .login-box .sub { font-size: 0.875rem; color: var(--text-muted); margin-bottom: 1.5rem; }
        .login-box label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--text-secondary); }
        .login-box input { width: 100%; margin-bottom: 1rem; }
        .login-box button { width: 100%; margin-top: 0.5rem; }
        .login-error { font-size: 0.875rem; color: #dc2626; margin-top: 0.5rem; }
        .login-success { font-size: 0.875rem; color: #16a34a; margin-top: 0.5rem; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/core/supabase-config.js"></script>
    <script type="module" src="/js/core/auth-service.js"></script>
</head>
<body class="login-page">
    <div class="login-box">
        <h1><i class="fas fa-crown"></i> SSEPI</h1>
        <p class="sub">Centro de Comando · Iniciar sesión (Supabase)</p>
        <form id="loginForm">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" required placeholder="tu@empresa.com" autocomplete="email">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required placeholder="••••••••" autocomplete="current-password">
            <button type="submit" class="btn-primary" id="btnLogin"><i class="fas fa-sign-in-alt"></i> Entrar</button>
        </form>
        <p id="loginMessage" class="login-error" style="display:none;"></p>
    </div>
    <script>
        (function applySavedTheme() {
            try {
                if (localStorage.getItem('theme') === 'dark') {
                    document.body.setAttribute('data-theme', 'dark');
                } else {
                    document.body.removeAttribute('data-theme');
                }
            } catch (_) {}
        })();
        (function redirectRecoveryToReset() {
            try {
                var h = window.location.hash || '';
                var search = window.location.search || '';
                if (h.indexOf('type=recovery') !== -1 || search.indexOf('type=recovery') !== -1) {
                    window.location.replace('/reset-password.html' + search + h);
                    return true;
                }
            } catch (e) {}
            return false;
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnLogin');
            const msg = document.getElementById('loginMessage');
            msg.style.display = 'none';
            msg.className = 'login-error';
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) {
                msg.textContent = 'Ingresa correo y contraseña.';
                msg.style.display = 'block';
                return;
            }
            if (!window.authService || !window.supabase) {
                msg.textContent = 'Error: no se cargó el servicio de autenticación. Comprueba la consola.';
                msg.style.display = 'block';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Conectando...';
            try {
                await window.authService.login(email, password);
                var profile = await window.authService.getCurrentProfile();
                if (profile && profile.rol) {
                    try { sessionStorage.setItem('ssepi_rol', profile.rol); } catch (e) {}
                }
                msg.textContent = 'Sesión iniciada. Redirigiendo al panel...';
                msg.className = 'login-success';
                msg.style.display = 'block';
                window.location.href = '/panel.html';
            } catch (err) {
                msg.textContent = err.message || 'Error al iniciar sesión. Verifica tu correo y contraseña.';
                msg.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
            }
        });

        window.addEventListener('load', async () => {
            await new Promise(r => setTimeout(r, 300));
            if (window.supabase) {
                const { data: { user } } = await window.supabase.auth.getUser();
                if (user) window.location.href = '/panel.html';
            }
        });
    </script>
</body>
</html>
