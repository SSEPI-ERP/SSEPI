<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/panel/assets/logo-ssepi.png">
    <title>SSEPI · Iniciar sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-box {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px 32px;
        }
        .logo {
            width: 70px;
            height: 70px;
            margin: 0 auto 16px;
            display: block;
        }
        h1 {
            text-align: center;
            font-size: 22px;
            color: #1e3a5f;
            margin-bottom: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 14px;
            color: #64748b;
            margin-bottom: 24px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 6px;
        }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 15px;
            font-family: inherit;
        }
        input:focus {
            outline: none;
            border-color: #2d5a87;
            box-shadow: 0 0 0 3px rgba(45, 90, 135, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #1e3a5f;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn-login:hover {
            background: #2d5a87;
        }
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 10px 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg.show { display: block; }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 16px;
        }
        .back-link a {
            color: #2d5a87;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="/panel/assets/logo-ssepi.png" alt="SSEPI" class="logo">
        <h1>Centro de Comando</h1>
        <p class="subtitle">Inicia sesión para continuar</p>

        <div class="error-msg" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="tu@empresa.com" required>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login" id="loginBtn">Entrar</button>
        </form>

        <div class="back-link">
            <a href="/">← Volver al inicio</a>
        </div>
    </div>

    <script type="module">
        // Inicializar Supabase
        const SUPABASE_URL = 'https://knzmdwjmrhcoytmebdwa.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtuem1kd2ptcmhjb3l0bWViZHdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwNDk5NzAsImV4cCI6MjA4NzYyNTk3MH0.y9AEScz9PWu3Tqnd-7R7fxf0smvVCosZF0edLg2j31A';

        window.supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true,
                flowType: 'pkce'
            }
        });

        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginBtn = document.getElementById('loginBtn');
        const errorMsg = document.getElementById('errorMsg');

        // Verificar sesión existente
        (async () => {
            const { data: { session } } = await window.supabase.auth.getSession();
            if (session) {
                window.location.href = '/panel/panel.html';
            }
        })();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Verificando...';
            errorMsg.classList.remove('show');

            try {
                const { data, error } = await window.supabase.auth.signInWithPassword({
                    email,
                    password
                });

                if (error) throw error;

                // Guardar perfil
                try {
                    const { data: perfil } = await window.supabase
                        .from('usuarios')
                        .select('rol, nombre')
                        .eq('auth_user_id', data.user.id)
                        .single();

                    if (perfil) {
                        sessionStorage.setItem('ssepi_rol', perfil.rol);
                        sessionStorage.setItem('ssepi_profile', JSON.stringify({
                            id: data.user.id,
                            email: data.user.email,
                            nombre: perfil.nombre || data.user.email.split('@')[0],
                            rol: perfil.rol || 'ventas'
                        }));
                    }
                } catch (e) {
                    console.warn('Perfil no cargado:', e);
                    sessionStorage.setItem('ssepi_rol', 'ventas');
                }

                window.location.href = '/panel/panel.html';
            } catch (error) {
                let msg = 'Error al iniciar sesión';
                if (error.message?.includes('Invalid login credentials')) {
                    msg = 'Correo o contraseña incorrectos';
                } else if (error.message) {
                    msg = error.message;
                }
                errorMsg.textContent = msg;
                errorMsg.classList.add('show');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Entrar';
            }
        });
    </script>
</body>
</html>
