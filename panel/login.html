<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/assets/logo-ssepi.png">
    <link rel="shortcut icon" type="image/png" href="/assets/logo-ssepi.png">
    <title>SSEPI · Inicio de Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="/js/core/supabase-config.js"></script>
    <script type="module" src="/js/core/auth-service.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 50%, #3d7ab5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-logo {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
        }
        .login-title {
            font-size: 24px;
            font-weight: 700;
            color: #1e3a5f;
        }
        .login-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-top: 8px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #2d5a87;
            box-shadow: 0 0 0 3px rgba(45, 90, 135, 0.1);
        }
        .password-input-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: #64748b;
            cursor: pointer;
            padding: 4px;
        }
        .password-toggle:hover {
            color: #374151;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #1e3a5f 0%, #2d5a87 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .login-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(30, 58, 95, 0.3);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .login-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 20px;
            display: none;
        }
        .login-error.show {
            display: block;
        }
        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }
        .forgot-password a {
            color: #2d5a87;
            font-size: 14px;
            text-decoration: none;
        }
        .forgot-password a:hover {
            text-decoration: underline;
        }
        .loading-spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <img src="/assets/logo-ssepi.png" alt="SSEPI" class="login-logo">
            <h1 class="login-title">Centro de Comando</h1>
            <p class="login-subtitle">Inicia sesión para continuar</p>
        </div>

        <div class="login-error" id="loginError"></div>

        <form id="loginForm">
            <div class="form-group">
                <label class="form-label" for="email">Correo electrónico</label>
                <input type="email" id="email" class="form-input" placeholder="tu@empresa.com" required autocomplete="email">
            </div>

            <div class="form-group">
                <label class="form-label" for="password">Contraseña</label>
                <div class="password-input-wrapper">
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required autocomplete="current-password">
                    <button type="button" class="password-toggle" id="passwordToggle" aria-label="Mostrar contraseña">
                        <i class="fas fa-eye"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span id="loginBtnText">Iniciar sesión</span>
            </button>
        </form>

        <div class="forgot-password">
            <a href="/reset-password.html">¿Olvidaste tu contraseña?</a>
        </div>
    </div>

    <script>
        (function() {
            const form = document.getElementById('loginForm');
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const errorDiv = document.getElementById('loginError');
            const passwordToggle = document.getElementById('passwordToggle');

            // Toggle password visibility
            passwordToggle.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fas fa-eye"></i>' : '<i class="fas fa-eye-slash"></i>';
            });

            // Check if already logged in
            async function checkExistingSession() {
                if (window.supabase) {
                    const { data: { session } } = await window.supabase.auth.getSession();
                    if (session) {
                        window.location.href = '/panel/panel.html';
                    }
                }
            }
            checkExistingSession();

            // Handle form submission
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const email = emailInput.value.trim();
                const password = passwordInput.value;

                // UI loading state
                loginBtn.disabled = true;
                loginBtnText.innerHTML = '<span class="loading-spinner"></span>Verificando...';
                errorDiv.classList.remove('show');

                try {
                    const result = await window.authService.login(email, password);

                    if (result.requiresMFA) {
                        // Redirigir a verificación MFA si es necesario
                        window.location.href = '/panel/panel.html?mfa=' + result.userId;
                        return;
                    }

                    // Login exitoso - guardar perfil y redirigir
                    const profile = await window.authService.getCurrentProfile();
                    if (profile) {
                        sessionStorage.setItem('ssepi_rol', profile.rol);
                        sessionStorage.setItem('ssepi_profile', JSON.stringify(profile));
                    }

                    window.location.href = '/panel/panel.html';
                } catch (error) {
                    console.error('Login error:', error);
                    let errorMessage = 'Error al iniciar sesión. Verifica tus credenciales.';

                    if (error.message) {
                        if (error.message.includes('Invalid login credentials')) {
                            errorMessage = 'Correo o contraseña incorrectos.';
                        } else if (error.message.includes('Email not confirmed')) {
                            errorMessage = 'Debes confirmar tu correo electrónico.';
                        } else if (error.message.includes('Too many requests')) {
                            errorMessage = 'Demasiados intentos. Intenta más tarde.';
                        } else {
                            errorMessage = error.message;
                        }
                    }

                    errorDiv.textContent = errorMessage;
                    errorDiv.classList.add('show');
                    loginBtn.disabled = false;
                    loginBtnText.textContent = 'Iniciar sesión';
                }
            });
        })();
    </script>
</body>
</html>
