<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/panel/assets/logo-ssepi.png">
    <link rel="shortcut icon" type="image/png" href="/panel/assets/logo-ssepi.png">
    <title>SSEPI · Restablecer contraseña</title>
  <link rel="stylesheet" href="/panel/css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/panel/js/core/supabase-config.js"></script>
  <script type="module" src="/panel/js/core/auth-service.js"></script>
  <style>
    body { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    main { max-width: 560px; margin: 0 auto; padding: 30px; }
    .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
    .title { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
    .muted { color: var(--text-muted); font-size: 13px; line-height: 1.4; margin-bottom: 16px; }
    .row { display: grid; gap: 8px; margin-bottom: 10px; }
    .row label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
    .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; flex-wrap: wrap; }
    .banner { display:none; margin-top: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-hover); font-size: 13px; }
    .banner.ok { border-color: rgba(46,125,50,.35); background: rgba(46,125,50,.10); }
    .banner.err { border-color: rgba(198,40,40,.35); background: rgba(198,40,40,.10); }
    .step-hidden { display: none !important; }
    .confirm-box { display: flex; gap: 10px; align-items: flex-start; margin-top: 8px; }
    .confirm-box input { margin-top: 4px; }
  </style>
</head>
<body class="page-panel">
  <main>
    <div class="card">
      <div class="title"><i class="fas fa-key"></i> Restablecer contraseña</div>
      <div class="muted">
        Confirma que solicitaste este enlace y luego define tu nueva contraseña. Al terminar irás al panel para revisar tu perfil.
      </div>

      <div id="stepConfirm">
        <div class="row">
          <label>Cuenta</label>
          <div id="recoveryEmail" class="muted" style="margin:0;font-weight:600;color:var(--text-primary)">…</div>
        </div>
        <div class="confirm-box">
          <input type="checkbox" id="confirmRecovery" />
          <label for="confirmRecovery" style="text-transform:none;font-weight:500;cursor:pointer">Confirmo que yo solicité restablecer la contraseña para esta cuenta.</label>
        </div>
        <div class="actions">
          <a class="btn-ssepi" href="/"><i class="fas fa-arrow-left"></i> Cancelar</a>
          <button class="btn-ssepi" type="button" id="btnContinue"><i class="fas fa-arrow-right"></i> Continuar</button>
        </div>
      </div>

      <div id="stepPassword" class="step-hidden">
        <div class="row">
          <label for="pass1">Nueva contraseña</label>
          <input id="pass1" type="password" autocomplete="new-password" placeholder="Nueva contraseña" />
        </div>
        <div class="row">
          <label for="pass2">Repetir nueva contraseña</label>
          <input id="pass2" type="password" autocomplete="new-password" placeholder="Repite la nueva contraseña" />
        </div>
        <div class="actions">
          <button class="btn-ssepi btn-secondary" type="button" id="btnBackStep"><i class="fas fa-arrow-left"></i> Atrás</button>
          <button class="btn-ssepi" type="button" id="saveBtn"><i class="fas fa-save"></i> Guardar contraseña</button>
        </div>
      </div>

      <div class="banner" id="msg"></div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      const msg = document.getElementById('msg');
      const saveBtn = document.getElementById('saveBtn');
      const btnContinue = document.getElementById('btnContinue');
      const btnBackStep = document.getElementById('btnBackStep');
      const pass1 = document.getElementById('pass1');
      const pass2 = document.getElementById('pass2');
      const stepConfirm = document.getElementById('stepConfirm');
      const stepPassword = document.getElementById('stepPassword');
      const recoveryEmailEl = document.getElementById('recoveryEmail');
      const confirmRecovery = document.getElementById('confirmRecovery');

      function show(text, kind) {
        msg.className = 'banner ' + (kind || '');
        msg.textContent = text;
        msg.style.display = 'block';
      }

      async function ensureSession() {
        const deadline = Date.now() + 8000;
        while (!window.supabase && Date.now() < deadline) {
          await new Promise(r => setTimeout(r, 50));
        }
        if (!window.supabase) throw new Error('Supabase no está disponible.');
        const { data, error } = await window.supabase.auth.getSession();
        if (error) throw error;
        if (!data || !data.session) {
          throw new Error('El enlace no es válido o ya expiró. Solicita un nuevo correo de restablecimiento.');
        }
        return data.session;
      }

      ensureSession().then(function (session) {
        const em = (session && session.user && session.user.email) || '—';
        recoveryEmailEl.textContent = em;
      }).catch(function (e) {
        show((e && e.message) ? e.message : String(e), 'err');
        stepConfirm.querySelector('.actions').style.display = 'none';
      });

      btnContinue.addEventListener('click', function () {
        msg.style.display = 'none';
        if (!confirmRecovery.checked) {
          show('Marca la casilla de confirmación para continuar.', 'err');
          return;
        }
        ensureSession().then(function () {
          stepConfirm.classList.add('step-hidden');
          stepPassword.classList.remove('step-hidden');
        }).catch(function (e) {
          show((e && e.message) ? e.message : String(e), 'err');
        });
      });

      btnBackStep.addEventListener('click', function () {
        stepPassword.classList.add('step-hidden');
        stepConfirm.classList.remove('step-hidden');
        msg.style.display = 'none';
      });

      saveBtn.addEventListener('click', async () => {
        try {
          const p1 = (pass1.value || '').trim();
          const p2 = (pass2.value || '').trim();
          if (!p1 || p1.length < 8) {
            show('La contraseña debe tener al menos 8 caracteres.', 'err');
            return;
          }
          if (p1 !== p2) {
            show('Las contraseñas no coinciden.', 'err');
            return;
          }
          await ensureSession();
          const { error } = await window.supabase.auth.updateUser({ password: p1 });
          if (error) throw error;
          show('Contraseña actualizada. Redirigiendo al panel para revisar tu perfil…', 'ok');
          setTimeout(() => {
            window.location.href = '/panel.html?abrir=config';
          }, 900);
        } catch (e) {
          show((e && e.message) ? e.message : String(e), 'err');
        }
      });
    });
  </script>
</body>
</html>
