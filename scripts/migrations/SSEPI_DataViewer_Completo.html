<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSEPI — Visor de Datos</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c1117;--surf:#131a24;--surf2:#1a2333;--brd:#1e2c3f;--acc:#00d4aa;--acc2:#0098d4;--warn:#f59e0b;--danger:#ef4444;--ok:#22c55e;--purple:#a78bfa;--txt:#e2eaf5;--muted:#6b7d9a;--font:'IBM Plex Sans',sans-serif;--mono:'IBM Plex Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px;min-height:100vh}
/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--brd);padding:12px 24px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:200}
.logo{width:34px;height:34px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;font-size:12px;color:#000;flex-shrink:0}
.hd-title{font-size:15px;font-weight:700}
.hd-sub{color:var(--muted);font-size:11px;margin-left:6px}
.hd-right{margin-left:auto;display:flex;align-items:center;gap:8px}
#gsearch{background:var(--surf2);border:1px solid var(--brd);border-radius:6px;color:var(--txt);padding:7px 12px;font-size:12px;width:200px;font-family:var(--font);outline:none}
#gsearch:focus{border-color:var(--acc)}
.btn-imp{background:var(--acc);color:#000;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-imp:hover{opacity:.85}
input[type=file]{display:none}
/* TABS */
.tabs{background:var(--surf);border-bottom:1px solid var(--brd);display:flex;overflow-x:auto;white-space:nowrap;padding:0 16px;gap:2px}
.tab{padding:11px 15px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;transition:color .15s,border-color .15s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--acc);border-bottom-color:var(--acc)}
.badge{background:var(--surf2);border-radius:10px;padding:1px 6px;font-size:10px;font-family:var(--mono);color:var(--muted)}
.tab.active .badge{background:rgba(0,212,170,.12);color:var(--acc)}
/* TOOLBAR */
.toolbar{padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid var(--brd);background:var(--surf)}
.toolbar input,.toolbar select{background:var(--surf2);border:1px solid var(--brd);border-radius:5px;color:var(--txt);padding:6px 10px;font-size:12px;font-family:var(--font);outline:none}
.toolbar input:focus,.toolbar select:focus{border-color:var(--acc)}
#t-search{width:220px}
.info{margin-left:auto;font-size:11px;color:var(--muted);font-family:var(--mono)}
.btn{background:var(--surf2);border:1px solid var(--brd);color:var(--txt);border-radius:5px;padding:6px 12px;font-size:11px;cursor:pointer;font-family:var(--font);transition:border-color .15s,color .15s}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn-add{background:rgba(0,212,170,.08);border-color:rgba(0,212,170,.25);color:var(--acc)}
/* PANELS */
.panel{display:none}
.panel.active{display:flex;flex-direction:column}
.table-wrap{overflow:auto;max-height:calc(100vh - 185px)}
table{width:100%;border-collapse:collapse}
thead th{background:var(--surf2);color:var(--muted);font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;padding:9px 12px;text-align:left;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--brd);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--txt)}
thead th.sorted{color:var(--acc)}
.si{margin-left:3px;opacity:.4;font-size:9px}
thead th.sorted .si{opacity:1}
tbody tr{border-bottom:1px solid rgba(255,255,255,.03);transition:background .1s}
tbody tr:hover{background:rgba(255,255,255,.025)}
tbody td{padding:8px 12px;vertical-align:middle;max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
td[contenteditable=true]{outline:none;border-radius:3px}
td[contenteditable=true]:focus{background:rgba(0,212,170,.07);box-shadow:inset 0 0 0 1px var(--acc);white-space:normal;overflow:visible;max-width:none;min-width:100px;position:relative;z-index:5}
.ra{display:flex;gap:3px}
.rb{background:none;border:none;cursor:pointer;padding:3px 5px;border-radius:3px;color:var(--muted);font-size:12px;transition:color .15s,background .15s}
.rb:hover.del{color:var(--danger);background:rgba(239,68,68,.1)}
/* STATUS */
.bs{display:inline-block;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;font-family:var(--mono);white-space:nowrap}
.s-orange{background:rgba(245,158,11,.1);color:#f59e0b}
.s-green{background:rgba(34,197,94,.1);color:#22c55e}
.s-red{background:rgba(239,68,68,.1);color:#ef4444}
.s-blue{background:rgba(0,152,212,.1);color:#5bb8f5}
.s-purple{background:rgba(167,139,250,.1);color:#a78bfa}
.s-cyan{background:rgba(0,212,170,.1);color:#00d4aa}
.s-gray{background:rgba(107,125,154,.1);color:#6b7d9a}
/* LINKS */
.lc{display:inline-block;background:rgba(0,152,212,.08);border:1px solid rgba(0,152,212,.2);color:var(--acc2);border-radius:3px;padding:1px 6px;font-size:10px;text-decoration:none;font-family:var(--mono)}
.lc:hover{background:rgba(0,152,212,.18)}
/* PRICE */
.price{font-family:var(--mono);color:#a3e6c8;font-size:12px}
/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--acc);color:#000;border-radius:8px;padding:10px 16px;font-size:12px;font-weight:700;box-shadow:0 4px 20px rgba(0,212,170,.3);opacity:0;pointer-events:none;transition:opacity .3s;z-index:999}
.toast.show{opacity:1}
/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:1000;align-items:center;justify-content:center}
.ov.open{display:flex}
.modal{background:var(--surf);border:1px solid var(--brd);border-radius:12px;padding:24px;width:460px;max-height:80vh;overflow-y:auto}
.modal h2{font-size:15px;margin-bottom:18px;color:var(--acc)}
.fr{margin-bottom:12px}
.fr label{display:block;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.fr input{width:100%;background:var(--surf2);border:1px solid var(--brd);border-radius:5px;color:var(--txt);padding:7px 10px;font-size:12px;font-family:var(--font);outline:none}
.fr input:focus{border-color:var(--acc)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
.btn-ok{background:var(--acc);color:#000;border:none;border-radius:6px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:var(--font)}
.btn-no{background:none;border:1px solid var(--brd);color:var(--muted);border-radius:6px;padding:8px 18px;font-size:12px;cursor:pointer;font-family:var(--font)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2e4060}
</style>
</head>
<body>
<header>
  <div class="logo">SP</div>
  <div><span class="hd-title">SSEPI</span><span class="hd-sub">Sistema de Datos Internos</span></div>
  <div class="hd-right">
    <input type="text" id="gsearch" placeholder="🔍 Buscar en tabla activa…" oninput="gSearch(this.value)">
    <label class="btn-imp" for="fi">＋ Importar Excel/CSV</label>
    <input type="file" id="fi" accept=".xlsx,.xls,.csv" multiple onchange="importF(event)">
  </div>
</header>
<div class="tabs" id="tabs"></div>
<div id="panels"></div>
<div class="toast" id="toast">✓ Guardado</div>
<div class="ov" id="ov">
  <div class="modal">
    <h2 id="mt">Nueva fila</h2>
    <div id="mf"></div>
    <div class="mf"><button class="btn-no" onclick="closeM()">Cancelar</button><button class="btn-ok" onclick="saveRow()">Guardar</button></div>
  </div>
</div>

let tables={},activeTab=null,sortS={},filterS={},curModal=null;
Object.keys(D).forEach(k=>{tables[k]={cols:[...D[k].cols],data:D[k].data.map(r=>[...r])}});

function init(){
  const te=document.getElementById('tabs'),pe=document.getElementById('panels');
  te.innerHTML='';pe.innerHTML='';
  Object.keys(tables).forEach((name,i)=>{
    const tab=document.createElement('div');
    tab.className='tab'+(i===0?' active':'');
    tab.dataset.name=name;
    const icon=getIcon(name);
    tab.innerHTML=`${icon} ${name} <span class="badge">${tables[name].data.length}</span>`;
    tab.onclick=()=>switchTab(name);
    te.appendChild(tab);
    const panel=document.createElement('div');
    panel.className='panel'+(i===0?' active':'');
    panel.id='p-'+btoa(encodeURIComponent(name)).replace(/[^a-zA-Z0-9]/g,'');
    pe.appendChild(panel);
  });
  activeTab=Object.keys(tables)[0];
  renderPanel(activeTab);
}

function getIcon(n){
  if(n.includes('BOM'))return'📦';
  if(n.includes('Contacto'))return'👥';
  if(n.includes('Fórmula'))return'🧮';
  if(n.includes('Automatiz'))return'⚙️';
  if(n.includes('Electrónic'))return'🔌';
  if(n.includes('Compra'))return'🛒';
  if(n.includes('Reparac'))return'🔧';
  if(n.includes('Venta'))return'📋';
  return'📄';
}

function panelId(name){return'p-'+btoa(encodeURIComponent(name)).replace(/[^a-zA-Z0-9]/g,'')}

function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.name===name));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.id===panelId(name)));
  if(!document.querySelector('#'+panelId(name)+' table'))renderPanel(name);
  activeTab=name;
  document.getElementById('gsearch').value=filterS[name]||'';
}

function renderPanel(name){
  const panel=document.getElementById(panelId(name));
  const {cols,data}=tables[name];
  const filter=(filterS[name]||'').toLowerCase();
  const sort=sortS[name]||{col:-1,dir:1};
  let rows=data.filter(r=>!filter||r.some(c=>c.toString().toLowerCase().includes(filter)));
  if(sort.col>=0){
    rows=[...rows].sort((a,b)=>{
      const av=a[sort.col]||'',bv=b[sort.col]||'';
      const an=parseFloat(av.toString().replace(/[$,]/g,'')),bn=parseFloat(bv.toString().replace(/[$,]/g,''));
      if(!isNaN(an)&&!isNaN(bn))return(an-bn)*sort.dir;
      return av.toString().localeCompare(bv.toString())*sort.dir;
    });
  }
  const colFilter=filterS[name+'_col']||'';
  const colSel=`<select onchange="setColFilter('${esc(name)}',this.value)" style="max-width:160px">
    <option value="">Todas las columnas</option>
    ${cols.map((c,i)=>`<option value="${i}"${colFilter===String(i)?'selected':''}>${c}</option>`).join('')}
  </select>`;
  panel.innerHTML=`
  <div class="toolbar">
    <input type="text" id="t-search" placeholder="🔍 Filtrar ${name}…" value="${filterS[name]||''}" oninput="setFilter('${esc(name)}',this.value)">
    ${colSel}
    <button class="btn btn-add" onclick="openAddModal('${esc(name)}')">＋ Fila</button>
    <button class="btn" onclick="exportCSV('${esc(name)}')">⬇ CSV</button>
    <div class="info">${rows.length} / ${data.length} filas</div>
  </div>
  <div class="table-wrap">
    <table>
      <thead><tr>${cols.map((c,i)=>`<th onclick="setSort('${esc(name)}',${i})" class="${sort.col===i?'sorted':''}">${c}<span class="si">${sort.col===i?(sort.dir===1?'▲':'▼'):'⇅'}</span></th>`).join('')}<th>—</th></tr></thead>
      <tbody>${rows.map((row,ri)=>rowHTML(name,row,ri,cols)).join('')}</tbody>
    </table>
    ${rows.length===0?`<div style="text-align:center;padding:50px;color:var(--muted)">Sin resultados</div>`:''}
  </div>`;
}

function esc(s){return s.replace(/'/g,"\\'")}

function rowHTML(tName,row,ri,cols){
  return`<tr data-t="${tName}" data-r="${ri}"><td>${
    cols.map((col,ci)=>{
      const val=row[ci]||'';
      if(isURL(val))return urlChip(col,val);
      if(isStatus(col))return statusBadge(val);
      if(isPrice(col,val))return`<span class="price">${fmtPrice(val)}</span>`;
      return`<span contenteditable="true" class="ce" data-col="${ci}" onblur="editCell(event,'${esc(tName)}',${ri})" title="${val.toString().substring(0,200)}">${val}</span>`;
    }).join('</td><td>')
  }</td><td><div class="ra"><button class="rb del" onclick="delRow('${esc(tName)}',${ri})" title="Eliminar">✕</button></div></td></tr>`;
}

function isURL(v){return typeof v==='string'&&(v.startsWith('http://')||v.startsWith('https://'))}
function isStatus(col){const c=col.toLowerCase();return c.includes('estado')||c==='estado'}
function isPrice(col,val){const c=col.toLowerCase();return(c.includes('precio')||c.includes('total')||c.includes('costo')||c.includes('importe')||c.includes('gasto'))&&val&&!isNaN(parseFloat(val.toString().replace(/[$,]/g,'')))}
function fmtPrice(v){const n=parseFloat(v.toString().replace(/[$,]/g,''));return isNaN(n)?v:'$'+n.toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2})}

function urlChip(col,val){
  let label='🔗';
  if(col.includes('OCTOPART'))label='◉ Oct';
  else if(col.includes('DIGIKEY'))label='◉ DK';
  else if(col.includes('MOUSER'))label='◉ Msr';
  else if(col.includes('LINK'))label='🔗 Link';
  return`<a href="${val}" target="_blank" class="lc">${label}</a>`;
}

function statusBadge(v){
  if(!v)return'';
  const m={
    'cotización':'s-orange','cotizacion':'s-orange',
    'orden de venta':'s-green','orden de compra':'s-green','confirmado':'s-green',
    'cancelado':'s-red',
    'en reparación':'s-blue','en reparacion':'s-blue',
    'reparado':'s-purple',
    'nuevo':'s-cyan','actualizado':'s-cyan',
    'no actualizado':'s-orange',
    'solicitud de cotización':'s-orange',
    'disponible':'s-green',
  };
  const cls=m[v.toLowerCase()]||'s-gray';
  return`<span class="bs ${cls}">${v}</span>`;
}

function setFilter(name,val){filterS[name]=val;renderPanel(name)}
function setColFilter(name,col){filterS[name+'_col']=col;renderPanel(name)}

function setSort(name,col){
  const s=sortS[name]||{col:-1,dir:1};
  sortS[name]={col,dir:s.col===col?s.dir*-1:1};
  renderPanel(name);
}

function editCell(e,tName,ri){
  const span=e.target,ci=parseInt(span.dataset.col);
  let val=span.innerText.trim().replace(/^\$/,'').replace(/,/g,'');
  tables[tName].data[ri][ci]=val;
  showToast();
  const col=tables[tName].cols[ci];
  if(isStatus(col)){span.outerHTML=statusBadge(val);return}
}

function delRow(tName,ri){
  if(!confirm('¿Eliminar fila?'))return;
  tables[tName].data.splice(ri,1);
  renderPanel(tName);
  updateBadge(tName);
}

function updateBadge(name){
  const t=document.querySelector(`.tab[data-name="${name}"] .badge`);
  if(t)t.textContent=tables[name].data.length;
}

function openAddModal(name){
  curModal=name;
  document.getElementById('mt').textContent='Nueva fila — '+name;
  document.getElementById('mf').innerHTML=tables[name].cols.map(c=>`<div class="fr"><label>${c}</label><input id="nf-${c.replace(/\s/g,'_')}" type="text" placeholder="${c}"></div>`).join('');
  document.getElementById('ov').classList.add('open');
}
function closeM(){document.getElementById('ov').classList.remove('open');curModal=null}
function saveRow(){
  if(!curModal)return;
  const row=tables[curModal].cols.map(c=>{const el=document.getElementById('nf-'+c.replace(/\s/g,'_'));return el?el.value.trim():''});
  tables[curModal].data.unshift(row);
  renderPanel(curModal);updateBadge(curModal);closeM();showToast();
}

function gSearch(q){
  filterS[activeTab]=q;
  renderPanel(activeTab);
}

function exportCSV(name){
  const{cols,data}=tables[name];
  const lines=[cols.join(','),...data.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=name.replace(/\s/g,'_')+'.csv';a.click();
}

function importF(e){
  Array.from(e.target.files).forEach(file=>{
    const reader=new FileReader();
    reader.onload=evt=>{
      try{
        if(window.XLSX){
          const wb=window.XLSX.read(evt.target.result,{type:'binary'});
          wb.SheetNames.forEach(sn=>{
            const ws=wb.Sheets[sn];
            const json=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
            if(json.length<2)return;
            const cols=json[0].map(c=>String(c).trim());
            const data=json.slice(1).filter(r=>r.some(v=>v)).map(r=>cols.map((_,i)=>String(r[i]||'').trim()));
            const label=file.name.replace(/\.(xlsx?|csv)$/i,'')+(wb.SheetNames.length>1?' — '+sn:'');
            tables[label]={cols,data};
          });
        }else{
          const rows=evt.target.result.split('\n').map(r=>r.split(',').map(c=>c.trim().replace(/^"|"$/g,'')));
          const label=file.name.replace(/\.csv$/i,'');
          tables[label]={cols:rows[0],data:rows.slice(1).filter(r=>r.some(c=>c))};
        }
        init();
        const last=Object.keys(tables)[Object.keys(tables).length-1];
        switchTab(last);
      }catch(err){alert('Error: '+err.message)}
    };
    if(file.name.endsWith('.csv'))reader.readAsText(file);
    else reader.readAsBinaryString(file);
  });
  e.target.value='';
}

let toastT;
function showToast(){
  const el=document.getElementById('toast');el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2000);
}

document.getElementById('ov').addEventListener('click',e=>{if(e.target===document.getElementById('ov'))closeM()});
const scr=document.createElement('script');
scr.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
document.head.appendChild(scr);

init();
</script>
</body>
</html>
