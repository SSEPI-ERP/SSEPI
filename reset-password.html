<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SSEPI · Restablecer contraseña</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="/js/core/supabase-config.js"></script>
  <script type="module" src="/js/core/auth-service.js"></script>
  <style>
    body { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    main { max-width: 560px; margin: 0 auto; padding: 30px; }
    .card { background: var(--bg-panel); border: 1px solid var(--border); border-radius: 16px; padding: 22px; }
    .title { font-size: 20px; font-weight: 900; margin-bottom: 10px; }
    .muted { color: var(--text-muted); font-size: 13px; line-height: 1.4; margin-bottom: 16px; }
    .row { display: grid; gap: 8px; margin-bottom: 10px; }
    .row label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .03em; }
    .actions { display:flex; gap:10px; justify-content:flex-end; margin-top:14px; }
    .banner { display:none; margin-top: 12px; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-hover); font-size: 13px; }
    .banner.ok { border-color: rgba(46,125,50,.35); background: rgba(46,125,50,.10); }
    .banner.err { border-color: rgba(198,40,40,.35); background: rgba(198,40,40,.10); }
  </style>
</head>
<body class="page-panel">
  <main>
    <div class="card">
      <div class="title"><i class="fas fa-key"></i> Restablecer contraseña</div>
      <div class="muted">
        Si abriste este enlace desde tu correo, aquí puedes definir una nueva contraseña.
      </div>

      <div class="row">
        <label for="pass1">Nueva contraseña</label>
        <input id="pass1" type="password" autocomplete="new-password" placeholder="Nueva contraseña" />
      </div>
      <div class="row">
        <label for="pass2">Repetir nueva contraseña</label>
        <input id="pass2" type="password" autocomplete="new-password" placeholder="Repite la nueva contraseña" />
      </div>

      <div class="actions">
        <a class="btn-ssepi" href="/" id="backBtn"><i class="fas fa-arrow-left"></i> Volver</a>
        <button class="btn-ssepi" type="button" id="saveBtn"><i class="fas fa-save"></i> Guardar</button>
      </div>

      <div class="banner" id="msg"></div>
    </div>
  </main>

  <script>
    window.addEventListener('load', () => {
      const msg = document.getElementById('msg');
      const saveBtn = document.getElementById('saveBtn');
      const pass1 = document.getElementById('pass1');
      const pass2 = document.getElementById('pass2');

      function show(text, kind) {
        msg.className = 'banner ' + (kind || '');
        msg.textContent = text;
        msg.style.display = 'block';
      }

      async function ensureSession() {
        // supabase-config.js usa detectSessionInUrl: true, pero esperamos un instante
        const deadline = Date.now() + 4000;
        while (!window.supabase && Date.now() < deadline) {
          await new Promise(r => setTimeout(r, 50));
        }
        if (!window.supabase) throw new Error('Supabase no está disponible.');
        const { data } = await window.supabase.auth.getSession();
        if (!data || !data.session) {
          throw new Error('El enlace no es válido o ya expiró. Solicita un nuevo correo de restablecimiento.');
        }
        return data.session;
      }

      saveBtn.addEventListener('click', async () => {
        try {
          const p1 = (pass1.value || '').trim();
          const p2 = (pass2.value || '').trim();
          if (!p1 || p1.length < 8) {
            show('La contraseña debe tener al menos 8 caracteres.', 'err');
            return;
          }
          if (p1 !== p2) {
            show('Las contraseñas no coinciden.', 'err');
            return;
          }
          await ensureSession();
          const { error } = await window.supabase.auth.updateUser({ password: p1 });
          if (error) throw error;
          show('Contraseña actualizada. Ahora puedes iniciar sesión.', 'ok');
          setTimeout(() => { window.location.href = '/'; }, 1200);
        } catch (e) {
          show((e && e.message) ? e.message : String(e), 'err');
        }
      });

      ensureSession().catch(e => {
        show((e && e.message) ? e.message : String(e), 'err');
      });
    });
  </script>
</body>
</html>
