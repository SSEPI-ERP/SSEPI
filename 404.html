<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SSEPI · Página no encontrada</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8eb 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1e293b;
        }
        .container {
            text-align: center;
            background: rgba(255,255,255,0.95);
            padding: 60px 80px;
            border-radius: 40px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            max-width: 600px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.5);
        }
        h1 {
            font-size: 120px;
            font-weight: 900;
            color: #006847;
            line-height: 1;
            margin-bottom: 10px;
            text-shadow: 0 10px 20px rgba(0,104,71,0.2);
        }
        h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 20px;
            color: #334155;
        }
        p {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            background: #006847;
            color: white;
            text-decoration: none;
            padding: 14px 36px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 4px 12px rgba(0,104,71,0.3);
        }
        .btn:hover {
            background: #008a5c;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0,104,71,0.4);
        }
        .btn:active {
            transform: translateY(0);
        }
        .logo {
            margin-bottom: 30px;
        }
        .logo svg {
            width: 80px;
            height: 80px;
            fill: #006847;
        }
        @media (max-width: 600px) {
            .container {
                padding: 40px 30px;
                margin: 20px;
            }
            h1 {
                font-size: 80px;
            }
            h2 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="none" stroke="#006847" stroke-width="4"/>
                <path d="M30 35 L70 35 L60 65 L40 65 Z" fill="#006847" opacity="0.9"/>
                <circle cx="50" cy="45" r="8" fill="white"/>
                <text x="50" y="58" text-anchor="middle" fill="#006847" font-size="14" font-weight="bold">SSEPI</text>
            </svg>
        </div>
        <h1>404</h1>
        <h2>Página no encontrada</h2>
        <p>Lo sentimos, la página que estás buscando no existe o ha sido movida.<br>Verifica la URL o regresa al inicio.</p>
        <a href="/index.html" class="btn">Volver al Panel Principal</a>
    </div>
</body>
</html>
