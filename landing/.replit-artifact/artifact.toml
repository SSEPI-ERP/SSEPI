kind = "web"
previewPath = "/"
title = "SSEPI Landing Page"
version = "1.0.0"
id = "artifacts/ssepi-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24747

[services.development]
run = "pnpm --filter @workspace/ssepi-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ssepi-landing", "run", "build" ]
publicDir = "artifacts/ssepi-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24747"
BASE_PATH = "/"
